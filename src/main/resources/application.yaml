spring:
  application:
    name: meuimovel
  data:
    mongodb:
      uri: ${MONGO_URI}
      database: meuimovel

springdoc:
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
